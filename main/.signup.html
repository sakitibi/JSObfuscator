<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Script-Type" content="text/javascript">
    <meta http-equiv="Content-Security-Policy" content="">
    <link rel="stylesheet" href="./.Styles/login.css">
    <link rel="shortcut icon" href="../build/icon_512x512@2x.icns">
    <title>JSObfuscator</title>
</head>
<body>
    <div class="home-window">
        <h2>13ninアカウントに登録</h2>
        <form id="signup-form">
            <label for="email">メール</label>
            <input type="email" id="email" placeholder="Email" required />
            <br>
            <label for="password">パスワード</label>
            <input type="password" id="password" placeholder="Password" minlength="6" required/>
            <br>
            <label for="username">ユーザー名</label>
            <input type="text" id="username" placeholder="Username" required />
            <br>
            <label for="birthday">生年月日</label>
            <input type="date" id="birthday" required>
            <br>
            <label for="game-select">各ゲームを持っていますか?</label>
            <select id="game-select" required>
                <option value="0" id="option0">MinecraftとAmongUsを両方持っている</option>
                <option value="1" id="option1">Minecraftだけ持っている</option>
                <option value="2" id="option2">AmongUsだけ持っている</option>
                <option value="3" id="option3">どちらとも持っていない</option>
            </select>
            <br>
            <button type="submit" class="submit">次へ</button>
        </form>
        <h4>すでにJSObfuscator用の13ninアカウントを持っています</h4>
        <h3>
            <a href="./.login.html">13ninアカウントにログイン</a>
        </h3>
    </div>
    <script src="./.Scripts/oncontextmenu.js"></script>
    <script src="./.Scripts/signup.js"></script>
</body>
</html>
